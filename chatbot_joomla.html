<!-- Include Google Fonts for Premium Typography -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Chatbot Markup -->
<div id="shopbot-widget">
    <!-- Floating Launcher Trigger Button -->
    <button id="shopbot-launcher" aria-label="Open Chatbot">
        <svg class="launcher-icon-chat" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Antenna -->
            <line x1="12" y1="4" x2="12" y2="1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            <circle cx="12" cy="1" r="1" fill="#00e5ff"/>
            <!-- Head -->
            <rect x="5" y="5" width="14" height="12" rx="4" fill="currentColor"/>
            <!-- Visor -->
            <rect x="7" y="8" width="10" height="5.5" rx="2.2" fill="#1e1b4b"/>
            <!-- Eyes -->
            <circle cx="9.5" cy="10.8" r="1.5" fill="#00e5ff"/>
            <circle cx="14.5" cy="10.8" r="1.5" fill="#00e5ff"/>
            <!-- Smile -->
            <path d="M10 13.5 Q12 15, 14 13.5" stroke="#00e5ff" stroke-width="0.8" fill="none" stroke-linecap="round"/>
            <!-- Ear cups -->
            <rect x="2.5" y="9" width="3" height="5.5" rx="1.3" fill="currentColor" opacity="0.8"/>
            <rect x="18.5" y="9" width="3" height="5.5" rx="1.3" fill="currentColor" opacity="0.8"/>
            <!-- Body -->
            <rect x="8" y="18" width="8" height="4" rx="2" fill="currentColor"/>
            <circle cx="12" cy="20" r="0.8" fill="#00e5ff"/>
        </svg>
        <svg class="launcher-icon-close" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
                d="M19 6.41L17.59 5L12 10.59L6.41 5L5 6.41L10.59 12L5 17.59L6.41 19L12 13.41L17.59 19L19 17.59L13.41 12L19 6.41Z"
                fill="currentColor" />
        </svg>
    </button>

    <!-- Main Chat Window Panel -->
    <div id="shopbot-container" class="shopbot-hidden">
        <!-- Header Section -->
        <div class="shopbot-header">
            <div class="shopbot-avatar-container">
                <div class="shopbot-avatar">
                    <!-- Robot Avatar SVG -->
                    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <!-- Antenna -->
                        <line x1="50" y1="18" x2="50" y2="8" stroke="#a5b4fc" stroke-width="2.5" stroke-linecap="round"/>
                        <circle cx="50" cy="6" r="3.5" fill="#00e5ff" class="antenna-glow"/>
                        <!-- Headphone band -->
                        <path d="M22 45 Q22 22, 50 20 Q78 22, 78 45" stroke="#6366f1" stroke-width="4" fill="none" stroke-linecap="round"/>
                        <!-- Left ear cup -->
                        <rect x="14" y="38" width="12" height="20" rx="5" fill="#6366f1"/>
                        <rect x="16" y="41" width="8" height="14" rx="3" fill="#818cf8"/>
                        <!-- Right ear cup -->
                        <rect x="74" y="38" width="12" height="20" rx="5" fill="#6366f1"/>
                        <rect x="76" y="41" width="8" height="14" rx="3" fill="#818cf8"/>
                        <!-- Head / face -->
                        <rect x="26" y="24" width="48" height="42" rx="14" fill="#1e1b4b"/>
                        <rect x="29" y="27" width="42" height="36" rx="11" fill="#312e81"/>
                        <!-- Visor / screen -->
                        <rect x="32" y="32" width="36" height="20" rx="8" fill="#0f0b2e"/>
                        <!-- Left eye -->
                        <circle cx="42" cy="42" r="5" fill="#00e5ff" class="eye-glow"/>
                        <circle cx="42" cy="42" r="2.5" fill="#ffffff" opacity="0.8"/>
                        <!-- Right eye -->
                        <circle cx="58" cy="42" r="5" fill="#00e5ff" class="eye-glow"/>
                        <circle cx="58" cy="42" r="2.5" fill="#ffffff" opacity="0.8"/>
                        <!-- Smile -->
                        <path d="M42 52 Q50 58, 58 52" stroke="#00e5ff" stroke-width="2" fill="none" stroke-linecap="round"/>
                        <!-- Mic boom -->
                        <path d="M24 52 Q18 58, 22 65" stroke="#a5b4fc" stroke-width="2" fill="none" stroke-linecap="round"/>
                        <circle cx="22" cy="67" r="3" fill="#6366f1"/>
                        <circle cx="22" cy="67" r="1.5" fill="#00e5ff"/>
                        <!-- Body hint -->
                        <rect x="36" y="68" width="28" height="14" rx="7" fill="#1e1b4b"/>
                        <rect x="39" y="71" width="22" height="8" rx="4" fill="#312e81"/>
                        <!-- Body light indicator -->
                        <circle cx="50" cy="75" r="2.5" fill="#00e5ff" class="body-glow"/>
                    </svg>
                    <span class="shopbot-status-dot"></span>
                </div>
                <div class="shopbot-header-text">
                    <h3>SonoBot</h3>
                    <p>Assistant SonoLight 💡</p>
                </div>
            </div>
            <button id="shopbot-close" aria-label="Close Chat">&times;</button>
        </div>

        <!-- Message Logs Box -->
        <div id="shopbot-messages" class="shopbot-messages">
            <!-- Welcome Profile Card (injected before messages) -->
            <div class="sb-profile-card">
                <div class="sb-profile-avatar-large">
                    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <line x1="50" y1="18" x2="50" y2="8" stroke="#a5b4fc" stroke-width="2.5" stroke-linecap="round"/>
                        <circle cx="50" cy="6" r="3.5" fill="#00e5ff" class="antenna-glow"/>
                        <path d="M22 45 Q22 22, 50 20 Q78 22, 78 45" stroke="#6366f1" stroke-width="4" fill="none" stroke-linecap="round"/>
                        <rect x="14" y="38" width="12" height="20" rx="5" fill="#6366f1"/>
                        <rect x="16" y="41" width="8" height="14" rx="3" fill="#818cf8"/>
                        <rect x="74" y="38" width="12" height="20" rx="5" fill="#6366f1"/>
                        <rect x="76" y="41" width="8" height="14" rx="3" fill="#818cf8"/>
                        <rect x="26" y="24" width="48" height="42" rx="14" fill="#1e1b4b"/>
                        <rect x="29" y="27" width="42" height="36" rx="11" fill="#312e81"/>
                        <rect x="32" y="32" width="36" height="20" rx="8" fill="#0f0b2e"/>
                        <circle cx="42" cy="42" r="5" fill="#00e5ff" class="eye-glow"/>
                        <circle cx="42" cy="42" r="2.5" fill="#ffffff" opacity="0.8"/>
                        <circle cx="58" cy="42" r="5" fill="#00e5ff" class="eye-glow"/>
                        <circle cx="58" cy="42" r="2.5" fill="#ffffff" opacity="0.8"/>
                        <path d="M42 52 Q50 58, 58 52" stroke="#00e5ff" stroke-width="2" fill="none" stroke-linecap="round"/>
                        <path d="M24 52 Q18 58, 22 65" stroke="#a5b4fc" stroke-width="2" fill="none" stroke-linecap="round"/>
                        <circle cx="22" cy="67" r="3" fill="#6366f1"/>
                        <circle cx="22" cy="67" r="1.5" fill="#00e5ff"/>
                        <rect x="36" y="68" width="28" height="14" rx="7" fill="#1e1b4b"/>
                        <rect x="39" y="71" width="22" height="8" rx="4" fill="#312e81"/>
                        <circle cx="50" cy="75" r="2.5" fill="#00e5ff" class="body-glow"/>
                    </svg>
                </div>
                <h4 class="sb-profile-name">SonoBot <span class="sb-verified">✓</span></h4>
                <p class="sb-profile-role">Assistant IA • SonoLight</p>
                <p class="sb-profile-desc">Votre expert en éclairage professionnel, matériel DJ et effets laser. Disponible 24/7 pour vous aider ! 🎵💡</p>
                <div class="sb-profile-stats">
                    <div class="sb-stat"><span class="sb-stat-value">24/7</span><span class="sb-stat-label">Disponible</span></div>
                    <div class="sb-stat"><span class="sb-stat-value">⚡</span><span class="sb-stat-label">Rapide</span></div>
                    <div class="sb-stat"><span class="sb-stat-value">🇲🇦</span><span class="sb-stat-label">Maroc</span></div>
                </div>
                <div class="sb-quick-actions">
                    <button class="sb-chip" data-msg="Quels produits avez-vous ?">🛒 Voir les produits</button>
                    <button class="sb-chip" data-msg="Quels sont les prix ?">💰 Prix</button>
                    <button class="sb-chip" data-msg="Comment se fait la livraison ?">🚚 Livraison</button>
                </div>
            </div>
            <!-- Messages are injected here dynamically by JavaScript -->
        </div>

        <!-- Typing Indicator -->
        <div id="shopbot-typing" class="shopbot-typing shopbot-hidden">
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
        </div>

        <!-- Input Area Section -->
        <div class="shopbot-input-area">
            <input type="text" id="shopbot-input" placeholder="Posez votre question sur nos produits..." autocomplete="off">
            <button id="shopbot-send" aria-label="Send Message">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2.01 21L23 12L2.01 3L2 10L17 12L2 14L2.01 21Z" fill="currentColor" />
                </svg>
            </button>
        </div>
    </div>
</div>

<!-- Styling Sheet -->
<style>
    /* CSS Variables for Clean Theming */
    :root {
        --sb-primary-gradient: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        --sb-primary-color: #4f46e5;
        --sb-bg-main: rgba(255, 255, 255, 0.95);
        --sb-bg-header: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
        --sb-text-dark: #1f2937;
        --sb-text-light: #f9fafb;
        --sb-text-muted: #6b7280;
        --sb-border-color: rgba(229, 231, 235, 0.8);
        --sb-user-bubble: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        --sb-bot-bubble: #f3f4f6;
        --sb-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        --sb-transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #shopbot-widget {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        position: fixed !important;
        bottom: 24px !important;
        right: 24px !important;
        z-index: 2147483647 !important;
        /* Ensure chatbot sits on top of all Joomla layout layers */
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        width: auto !important;
        height: auto !important;
        pointer-events: none;
    }

    /* Launcher Button */
    #shopbot-launcher {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: var(--sb-primary-gradient);
        color: white;
        border: none;
        cursor: pointer;
        box-shadow: 0 4px 14px rgba(79, 70, 229, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: var(--sb-transition);
        position: fixed !important;
        right: 24px !important;
        bottom: 24px !important;
        pointer-events: auto;
    }

    #shopbot-launcher:hover {
        transform: scale(1.08) rotate(5deg);
        box-shadow: 0 6px 20px rgba(79, 70, 229, 0.6);
    }

    #shopbot-launcher svg {
        width: 26px;
        height: 26px;
        position: absolute;
        transition: var(--sb-transition);
    }

    #shopbot-launcher .launcher-icon-close {
        opacity: 0;
        transform: scale(0.5);
    }

    #shopbot-launcher.active .launcher-icon-chat {
        opacity: 0;
        transform: scale(0.5);
    }

    #shopbot-launcher.active .launcher-icon-close {
        opacity: 1;
        transform: scale(1);
    }

    /* Chat Window Panel */
    #shopbot-container {
        width: 380px;
        height: 520px;
        max-height: 80vh;
        position: fixed !important;
        right: 24px !important;
        bottom: 100px !important;
        background: var(--sb-bg-main);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--sb-border-color);
        border-radius: 20px;
        box-shadow: var(--sb-shadow);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        margin-bottom: 16px;
        transition: opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1), transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        transform-origin: bottom right;
        pointer-events: auto;
    }

    #shopbot-container.shopbot-hidden {
        opacity: 0;
        transform: scale(0.8) translateY(40px);
        pointer-events: none;
    }

    /* Header */
    .shopbot-header {
        background: var(--sb-bg-header);
        color: var(--sb-text-light);
        padding: 16px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .shopbot-avatar-container {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .shopbot-avatar {
        width: 44px;
        height: 44px;
        background: rgba(99, 102, 241, 0.25);
        border-radius: 50%;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        border: 2px solid rgba(0, 229, 255, 0.3);
        box-shadow: 0 0 12px rgba(0, 229, 255, 0.15);
    }

    .shopbot-avatar svg {
        width: 32px;
        height: 32px;
    }

    /* Robot eye glow animation */
    .eye-glow {
        animation: eyePulse 3s ease-in-out infinite;
    }
    .antenna-glow {
        animation: antennaBlink 2s ease-in-out infinite;
    }
    .body-glow {
        animation: antennaBlink 2.5s ease-in-out infinite 0.5s;
    }

    @keyframes eyePulse {
        0%, 100% { opacity: 1; filter: drop-shadow(0 0 3px #00e5ff); }
        50% { opacity: 0.7; filter: drop-shadow(0 0 8px #00e5ff); }
    }

    @keyframes antennaBlink {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; filter: drop-shadow(0 0 6px #00e5ff); }
    }

    .shopbot-status-dot {
        width: 10px;
        height: 10px;
        background: #10b981;
        border: 2px solid #1e1b4b;
        border-radius: 50%;
        position: absolute;
        bottom: 0;
        right: 0;
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0% {
            transform: scale(0.95);
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
        }

        70% {
            transform: scale(1);
            box-shadow: 0 0 0 5px rgba(16, 185, 129, 0);
        }

        100% {
            transform: scale(0.95);
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
        }
    }

    .shopbot-header-text h3 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0.3px;
        color: white;
        line-height: 1.2;
    }

    .shopbot-header-text p {
        margin: 2px 0 0 0;
        font-size: 11px;
        color: #a5b4fc;
        line-height: 1.2;
    }

    /* ===== Profile Card Styles ===== */
    .sb-profile-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 20px 16px 16px;
        margin-bottom: 4px;
        animation: profileSlideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes profileSlideIn {
        from { opacity: 0; transform: translateY(-15px) scale(0.95); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .sb-profile-avatar-large {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, rgba(99, 102, 241, 0.15) 0%, rgba(0, 229, 255, 0.1) 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 12px;
        border: 2px solid rgba(0, 229, 255, 0.2);
        box-shadow: 0 0 20px rgba(0, 229, 255, 0.1), inset 0 0 15px rgba(99, 102, 241, 0.05);
        position: relative;
        animation: avatarFloat 4s ease-in-out infinite;
    }

    @keyframes avatarFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
    }

    .sb-profile-avatar-large svg {
        width: 56px;
        height: 56px;
    }

    .sb-profile-name {
        margin: 0 0 2px 0;
        font-size: 17px;
        font-weight: 700;
        color: #1e1b4b;
        letter-spacing: 0.2px;
    }

    .sb-verified {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #4f46e5, #6366f1);
        color: white;
        font-size: 10px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        margin-left: 4px;
        vertical-align: middle;
    }

    .sb-profile-role {
        margin: 0 0 8px 0;
        font-size: 11.5px;
        color: #6b7280;
        font-weight: 500;
    }

    .sb-profile-desc {
        margin: 0 0 14px 0;
        font-size: 12.5px;
        color: #4b5563;
        line-height: 1.5;
        max-width: 280px;
    }

    .sb-profile-stats {
        display: flex;
        gap: 16px;
        margin-bottom: 14px;
        padding: 10px 20px;
        background: linear-gradient(135deg, rgba(99, 102, 241, 0.06) 0%, rgba(0, 229, 255, 0.04) 100%);
        border-radius: 12px;
        border: 1px solid rgba(99, 102, 241, 0.08);
    }

    .sb-stat {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
    }

    .sb-stat-value {
        font-size: 14px;
        font-weight: 700;
        color: #4f46e5;
    }

    .sb-stat-label {
        font-size: 10px;
        color: #9ca3af;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .sb-quick-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        justify-content: center;
    }

    .sb-chip {
        background: white;
        border: 1px solid rgba(99, 102, 241, 0.2);
        border-radius: 20px;
        padding: 6px 12px;
        font-size: 11.5px;
        font-weight: 500;
        color: #4f46e5;
        cursor: pointer;
        transition: all 0.2s ease;
        font-family: inherit;
    }

    .sb-chip:hover {
        background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
        color: white;
        border-color: transparent;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
    }

    #shopbot-close {
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.7);
        font-size: 24px;
        cursor: pointer;
        line-height: 1;
        transition: var(--sb-transition);
    }

    #shopbot-close:hover {
        color: white;
        transform: scale(1.1);
    }

    /* Chat Messages Area */
    .shopbot-messages {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
        background-color: #fafafa;
    }

    /* Custom Scrollbar for messages */
    .shopbot-messages::-webkit-scrollbar {
        width: 6px;
    }

    .shopbot-messages::-webkit-scrollbar-track {
        background: transparent;
    }

    .shopbot-messages::-webkit-scrollbar-thumb {
        background: #e5e7eb;
        border-radius: 3px;
    }

    /* Chat Bubbles */
    .sb-message {
        max-width: 88%;
        padding: 12px 16px;
        border-radius: 16px;
        font-size: 13px;
        line-height: 1.5;
        white-space: pre-line;
        overflow-wrap: break-word;
        animation: bubbleFadeIn 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes bubbleFadeIn {
        from {
            opacity: 0;
            transform: translateY(10px) scale(0.96);
        }

        to {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    }

    .sb-message-user {
        align-self: flex-end;
        background: var(--sb-user-bubble);
        color: white;
        border-bottom-right-radius: 4px;
        box-shadow: 0 4px 10px rgba(37, 99, 235, 0.15);
    }

    .sb-message-bot {
        align-self: flex-start;
        background: var(--sb-bot-bubble);
        color: var(--sb-text-dark);
        border-bottom-left-radius: 4px;
        border: 1px solid var(--sb-border-color);
        font-weight: 500;
    }

    /* Typing Indicator Styling */
    .shopbot-typing {
        align-self: flex-start;
        margin-left: 20px;
        margin-bottom: 12px;
        padding: 10px 16px;
        background: var(--sb-bot-bubble);
        border: 1px solid var(--sb-border-color);
        border-radius: 16px;
        border-bottom-left-radius: 4px;
        display: flex;
        gap: 4px;
    }

    .shopbot-typing.shopbot-hidden {
        display: none !important;
    }

    .typing-dot {
        width: 6px;
        height: 6px;
        background-color: var(--sb-text-muted);
        border-radius: 50%;
        animation: typingBounce 1.4s infinite ease-in-out both;
    }

    .typing-dot:nth-child(1) {
        animation-delay: -0.32s;
    }

    .typing-dot:nth-child(2) {
        animation-delay: -0.16s;
    }

    @keyframes typingBounce {

        0%,
        80%,
        100% {
            transform: scale(0);
        }

        40% {
            transform: scale(1.0);
        }
    }

    /* Input Area */
    .shopbot-input-area {
        padding: 14px 16px;
        border-top: 1px solid var(--sb-border-color);
        display: flex;
        align-items: center;
        gap: 8px;
        background: white;
    }

    #shopbot-input {
        flex: 1;
        border: 1px solid var(--sb-border-color);
        border-radius: 24px;
        padding: 10px 16px;
        font-size: 13.5px;
        outline: none;
        transition: var(--sb-transition);
    }

    #shopbot-input:focus {
        border-color: var(--sb-primary-color);
        box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.15);
    }

    #shopbot-send {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: var(--sb-primary-gradient);
        color: white;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;

    }

    /* Responsive adjustment for Mobile Screen Sizes */
    @media (max-width: 480px) {
        #shopbot-widget {

        #shopbot-container {
            width: calc(100vw - 24px);
            height: 480px;
            right: 12px !important;
            bottom: 88px !important;
        }

        #shopbot-launcher {

            bottom: 12px !important;

    /* ===== Guided Conversation Options ===== */
    .sb-guide-options {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 8px 4px;
        animation: bubbleFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;

    .sb-guide-btn {
        background: white;
        border: 1.5px solid rgba(99, 102, 241, 0.25);

    /* ===== Markdown in Bot Bubbles ===== */

    .sb-guide-step-label {
        font-size: 10px;

<!-- Script Logic -->
<script>
    function initShopBotWidget() {
        // Change to false to disable the chatbot without deleting the code from Joomla.
        const SHOPBOT_ENABLED = true;

        // API config (Update IP/domain if Flask is hosted on server)
        const API_URL = "http://localhost:5000/api/chat";

        // Session ID for conversation history
        const SESSION_ID = crypto.randomUUID ? crypto.randomUUID() : ('sb-' + Date.now() + '-' + Math.random().toString(36).slice(2));
        const GUIDE_URL = "http://localhost:5000/api/guide";

        // UI Elements
        const widget = document.getElementById("shopbot-widget");
        const launcher = document.getElementById("shopbot-launcher");
        const container = document.getElementById("shopbot-container");
        const closeBtn = document.getElementById("shopbot-close");
        const messageBox = document.getElementById("shopbot-messages");
        const chatInput = document.getElementById("shopbot-input");
        const sendBtn = document.getElementById("shopbot-send");
        const typingIndicator = document.getElementById("shopbot-typing");

        if (!SHOPBOT_ENABLED) {
            widget.remove();
            return;
        }

        // Joomla templates can wrap modules in transformed/sticky containers.
        // Moving the widget to <body> keeps fixed positioning relative to the viewport.
        if (widget.parentElement !== document.body) {
            document.body.appendChild(widget);
        }

        // Toggle Chat Visibility
        launcher.addEventListener("click", () => {
            const isOpen = !container.classList.contains("shopbot-hidden");
            if (isOpen) {
                closeChat();
            } else {
                openChat();
            }
        });

        closeBtn.addEventListener("click", closeChat);

        // Quick action chip handlers
        document.querySelectorAll(".sb-chip").forEach(chip => {
            chip.addEventListener("click", () => {
                const msg = chip.getAttribute("data-msg");
                if (msg) {
                    chatInput.value = msg;
                    handleSendMessage();
                }
            });
        });

        function openChat() {
            container.classList.remove("shopbot-hidden");
            launcher.classList.add("active");
            chatInput.focus();
            scrollToBottom();
        }

        function closeChat() {
            container.classList.add("shopbot-hidden");
            launcher.classList.remove("active");
        }

        // Handle Sending Messages
        sendBtn.addEventListener("click", handleSendMessage);
        chatInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                handleSendMessage();
            }
        });

        function handleSendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            // Display user message in chat
            addMessage(text, "user");
            chatInput.value = "";

            // Show typing indicator
            showTyping(true);

            // API Request using fetch
            fetch(API_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ message: text, session_id: SESSION_ID })
            })
                .then(async response => {
                    if (!response.ok) {
                        let errMsg = "API Connection Failed";
                        try {
                            const errJson = await response.json();
                            if (errJson && errJson.response) {
                                errMsg = errJson.response;
                            } else if (errJson && errJson.error) {
                                errMsg = errJson.error;
                            }
                        } catch (e) { }
                        throw new Error(errMsg);
                    }
                    return response.json();
                })
                .then(data => {
                    showTyping(false);
                    if (data && data.type === 'guide') {
                        addMessage(data.response, "bot");
                        renderGuideOptions(data.options, data.step, data.criteria || {});
                    } else if (data && data.type === 'result') {
                        addMessage(data.response, "bot");
                    } else if (data && data.response) {
                        addMessage(data.response, "bot");
                    } else {
                        addMessage("I'm sorry, I received an unexpected response structure.", "bot");
                    }
                })
                .catch(error => {
                    showTyping(false);
                    console.error("Chatbot Error:", error);
                    let displayMsg = error.message;
                    if (displayMsg === "Failed to fetch" || displayMsg.includes("network")) {
                        displayMsg = "Could not connect to Flask API (http://localhost:5000). Ensure Flask server is running.";
                    } else {
                        displayMsg = "Error: " + displayMsg;
                    }
                    addMessage(displayMsg, "bot");
                });
        }

        // ---- Guided Conversation Options ----
        function renderGuideOptions(options, step, criteria) {
            const wrapper = document.createElement('div');
            wrapper.classList.add('sb-guide-options');

            const stepLabels = { 1: 'Étape 1/4', 2: 'Étape 2/4', 3: 'Étape 3/4', 4: 'Étape 4/4' };
            const stepLabel = document.createElement('div');
            stepLabel.classList.add('sb-guide-step-label');
            stepLabel.textContent = stepLabels[step] || '';
            wrapper.appendChild(stepLabel);

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.classList.add('sb-guide-btn');
                btn.textContent = opt.label;
                btn.addEventListener('click', () => {
                    // Disable all buttons in this group
                    wrapper.querySelectorAll('.sb-guide-btn').forEach(b => {
                        b.disabled = true;
                        b.classList.add('sb-guide-btn-disabled');
                    });
                    btn.classList.remove('sb-guide-btn-disabled');
                    btn.classList.add('sb-guide-btn-selected');

                    // Show user's choice
                    addMessage(opt.label, "user");
                    showTyping(true);

                    // Send to guide endpoint
                    fetch(GUIDE_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            step: step,
                            answer: opt.value,
                            criteria: criteria
                        })
                    })
                    .then(res => {
                        if (!res.ok) throw new Error("Guide API error");
                        return res.json();
                    })
                    .then(data => {
                        showTyping(false);
                        if (data.type === 'guide') {
                            addMessage(data.response, "bot");
                            renderGuideOptions(data.options, data.step, data.criteria || {});
                        } else if (data.type === 'result' || data.response) {
                            addMessage(data.response, "bot");
                        }
                    })
                    .catch(err => {
                        showTyping(false);
                        console.error("Guide Error:", err);
                        addMessage("Erreur de connexion. Réessayez s'il vous plaît.", "bot");
                    });
                });
                wrapper.appendChild(btn);
            });

            messageBox.appendChild(wrapper);
            scrollToBottom();
        }

        /**
         * Lightweight Markdown renderer for bot messages.
         * Converts **bold**, *italic*, and "- item" lists to HTML.
         * User messages are always plain text for safety.
         */
        function renderMarkdown(text) {
            // Sanitize: escape HTML entities to prevent XSS
            let safe = text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');

            // Bold: **text**
            safe = safe.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            // Italic: *text*
            safe = safe.replace(/\*(.+?)\*/g, '<em>$1</em>');

            // Lists: lines starting with "- "
            const lines = safe.split('\n');
            let result = [];
            let inList = false;

            for (const line of lines) {
                const trimmed = line.trim();
                if (trimmed.startsWith('- ')) {
                    if (!inList) {
                        result.push('<ul>');
                        inList = true;
                    }
                    result.push('<li>' + trimmed.slice(2) + '</li>');
                } else {
                    if (inList) {
                        result.push('</ul>');
                        inList = false;
                    }
                    if (trimmed === '') {
                        result.push('<br>');
                    } else {
                        result.push('<p>' + trimmed + '</p>');
                    }
                }
            }
            if (inList) result.push('</ul>');

            return result.join('');
        }

        function addMessage(text, sender) {
            const msgDiv = document.createElement("div");
            msgDiv.classList.add("sb-message", `sb-message-${sender}`);

            if (sender === "bot") {
                // Render Markdown for bot messages (already sanitized)
                msgDiv.innerHTML = renderMarkdown(text);
            } else {
                // User messages: always plain text for security
                msgDiv.textContent = text;
            }

            messageBox.appendChild(msgDiv);
            scrollToBottom();
        }

        function showTyping(show) {
            if (show) {
                typingIndicator.classList.remove("shopbot-hidden");
                // Move typing indicator to the bottom of the container
                messageBox.appendChild(typingIndicator);
            } else {
                typingIndicator.classList.add("shopbot-hidden");
            }
            scrollToBottom();
        }

        function scrollToBottom() {
            messageBox.scrollTop = messageBox.scrollHeight;
        }

        // Initialize Widget
        addMessage("Bonjour ! \ud83d\ude0a Je suis SonoBot, votre assistant SonoLight. Je peux vous aider \u00e0 trouver des produits, v\u00e9rifier les prix et la disponibilit\u00e9. Comment puis-je vous aider ?", "bot");
    }

    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", initShopBotWidget);
    } else {
        initShopBotWidget();
    }
</script>
